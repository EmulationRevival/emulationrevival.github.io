name: Nightly and Rebuild Scripts

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install Dependencies
        run: npm install cheerio dotenv node-fetch@2 js-yaml

      - name: Print Node Dependency Versions
        run: |
          echo "Node:"
          node -v

          echo "npm:"
          npm -v

          echo "Installed top-level packages:"
          npm ls --depth=0 || true

          echo "Full npm dependency tree:"
          npm ls || true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll

      - name: Print Ruby and Jekyll Versions
        run: |
          echo "Ruby:"
          ruby -v

          echo "RubyGems:"
          gem -v

          echo "Bundler:"
          bundle -v || true

          echo "Jekyll:"
          jekyll -v

          echo "Installed Jekyll gems:"
          gem list jekyll

      - name: Backup previous app-links
        run: cp json/app-links.json /tmp/app-links.previous.json || echo "{}" > /tmp/app-links.previous.json

      - name: Run Build Links Script
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: node build-links.js

      - name: Build Jekyll Release Data
        run: node js/build-release-data.js

      - name: Run Build Index Script
        run: node js/build-index.js

      - name: Run Build Previews Script
        run: node js/build-previews.js

      - name: Update Data Version
        run: node js/update-version.js

      - name: Build Jekyll Site
        run: jekyll build

      - name: Validate Site Data
        run: node js/validate-site-data.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add json/ previews/ _data/release_data.json

          if git diff --cached --quiet; then
            echo "No build changes to commit."
          else
            git commit -m "Automated update: Build links, release data, search index and preview pages"
            git push
          fi

      - name: Wait for GitHub Pages to catch up
        run: sleep 90

      - name: Post Discord Updates
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
        run: node js/post-discord-updates.js /tmp/app-links.previous.json json/app-links.json json/search-index.json

      - name: Sync Discord Forum Posts
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: node js/sync-discord-forum-posts.js

      - name: Commit Discord Forum Registry
        run: |
          if [ -z "$(git status --porcelain -- json/discord-forum-posts.json)" ]; then
            echo "No Discord forum registry changes."
            exit 0
          fi

          git add json/discord-forum-posts.json
          git commit -m "Update Discord forum post registry"
          git push
