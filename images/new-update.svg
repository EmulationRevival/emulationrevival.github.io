<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <clipPath id="card-bounds">
      <rect width="1280" height="720" />
    </clipPath>
    
    <filter id="ribbon-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="-2" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g clip-path="url(#card-bounds)">
    
    <g transform="translate(1160, 120) rotate(45)" filter="url(#ribbon-shadow)">
      
      <rect x="-300" y="-40" width="600" height="80" fill="#8a2be2" />
      
      <text x="0" y="2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">
        NEW UPDATE
      </text>
      
    </g>
  </g>
</svg>
